# Designed for guition-esp32-p4-jc8012p4a1
esp32:
  board: esp32-p4-evboard
  cpu_frequency: 360MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: yes
      
# Esphome
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  area: ${room}

# Secondary ESP32-C6 device for connectivity
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

# Video memory
psram:
  mode: hex
  speed: 100MHz

# Over the Air Updates
ota:
  platform: esphome

# Enable Home Assistant API
api:
  encryption:
    key: "sKh41FHDZui8m5b49wEggjzBE24nTE7gVcEEYiH6AI4="

# Enable logging
logger:
  level: VERY_VERBOSE

# External components
external_components:
  - source: github://kvj/esphome@jd9365_gsl3680
    components: [gsl3680, jd9365]
    refresh: 0s

# Power management
esp_ldo:
  - channel: 3
    voltage: 2.5V

# Backlight
output:
  - id: backlight_output
    platform: ledc
    pin: GPIO23

light:
  - platform: monochromatic
    output: backlight_output
    name: LCD Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON
    default_transition_length: 0s
    gamma_correct: 1.0

# I2C
i2c:
  - id: i2c_bus
    sda: GPIO7
    scl: GPIO8
    scan: true
    frequency: 400kHz

# Touchscreen
touchscreen:
  - platform: gsl3680
    id: my_touchscreen
    reset_pin: GPIO22
    interrupt_pin: GPIO21
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: true
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - light.turn_on: display_backlight
              - lvgl.resume:
              - lvgl.widget.redraw:

# Display
display:
  - platform: mipi_dsi
    model: JC8012P4A1
    id: my_display
    reset_pin: GPIO27
    show_test_card: false
